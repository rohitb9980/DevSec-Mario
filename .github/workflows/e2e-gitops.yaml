name: "Run SAST, Build and push supermario image, scan image, Update deployment and version txt files"
 
on:
  push:
    branches:
      - main
 
jobs:
 
  sonarqube_sast_scan:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
 
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: rohitb9980_DevSec-Mario
          SONAR_ORGANIZATION: rohitb9980
  
  build_push_supermario_docker_image:
    runs-on: ubuntu-latest
    needs: sonarqube_sast_scan
    outputs:
      VERSION: ${{ steps.get_version.outputs.VERSION }}
 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Calculate Dynamic Version
        id: get_version
        run: |
          BASE_VERSION=$(cat version.txt)
          NEW_VERSION=$((BASE_VERSION + 1))
          echo "VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Calculated Version: $NEW_VERSION"
  
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
 
      - name: Build and Push Docker Image
        run: |
          docker build -t docker.io/rohitbondre1309/supermariogitopsproject:${{ steps.get_version.outputs.VERSION }} .
          docker push docker.io/rohitbondre1309/supermariogitopsproject:${{ steps.get_version.outputs.VERSION }}
 
  run_container_image_scan_on_supermario_docker_image:
    runs-on: ubuntu-latest
    needs: build_push_supermario_docker_image	
 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
          
      - name: Run Trivy vulnerability scanner directly against remote registry
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'docker.io/rohitbondre1309/supermariogitopsproject:${{ needs.build_push_supermario_docker_image.outputs.VERSION }}'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          
  update_k8s_yaml_version_file_with_latest_image_tag:
    runs-on: ubuntu-latest
    needs: [build_push_supermario_docker_image, run_container_image_scan_on_supermario_docker_image]
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
 
      - name: Set Git Config
        run: |
           git config --global user.email "${{ secrets.GIT_EMAIL}}"
           git config --global user.name "${{ secrets.GIT_USERNAME}}"
 
      - name: Update Deployment YAML
        run: |
          git pull
          TARGET_VERSION="${{ needs.build_push_supermario_docker_image.outputs.VERSION }}"
          sed -i "s|image: rohitbondre1309/supermariogitopsproject:.*$|image: rohitbondre1309/supermariogitopsproject:${TARGET_VERSION}|" deployment.yaml
          echo "${TARGET_VERSION}" > version.txt
          git add deployment.yaml version.txt
          git commit -m "Updated deployment yaml and version txt file with supermario image tag to ${TARGET_VERSION}"
          git push
